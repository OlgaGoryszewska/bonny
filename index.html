<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luxury Diamond Reflection Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="jewelry-demo" aria-labelledby="demo-title">
        <div class="demo-copy">
          <p>Interactive jewelry light study</p>
          <h1 id="demo-title">Diamond Fire, Guided by Motion</h1>
        </div>

        <figure
          class="jewelry-frame"
          id="jewelryFrame"
          aria-label="Diamond ring with interactive light reflections"
        >
          <!-- Replace this src with your jewelry image. The base image is never edited. -->
          <img
            class="jewelry-image"
            src="public/diamonds.png"
            alt="Diamond ring"
            draggable="false"
          />

          <!-- All animated light lives above the image and is clipped to the diamond hotspot. -->
          <div class="diamond-effects" aria-hidden="true">
            <div class="light-sweep"></div>
            <div class="diamond-fire"></div>
            <canvas class="sparkle-canvas" id="sparkleCanvas"></canvas>
          </div>
        </figure>

        <button class="motion-button" id="motionButton" type="button">
          Enable phone motion
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
